name: CI

on:
  pull_request:
    branches: [develop, staging, main]

jobs:
  quality:
    name: Quality & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure @coongro registry
        run: npm config set @coongro:registry ${{ secrets.STAGING_VERDACCIO_URL }}

      - name: Authenticate with registry
        run: npm config set //${{ secrets.STAGING_VERDACCIO_URL_HOST }}/:_authToken ${{ secrets.STAGING_VERDACCIO_TOKEN }}

      - run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
